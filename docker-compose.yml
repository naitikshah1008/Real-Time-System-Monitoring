services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: rtm-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: rtm-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"      # inside Docker network
      - "29092:29092"    # reachable from your host
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: rtm-kafka-init
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic metrics_raw --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic metrics_anomalies --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic incident_commands --partitions 1 --replication-factor 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rtm-kafka-ui
    profiles:
      - debug
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: rtm-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  schema-registrar:
    build: ./schema-registry
    container_name: rtm-schema-registrar
    restart: on-failure
    depends_on:
      schema-registry:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_DIR: /schemas
    volumes:
      - ./schemas:/schemas:ro

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: rtm-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    environment:
      POSTGRES_USER: rtm
      POSTGRES_PASSWORD: rtm
      POSTGRES_DB: rtm
    ports:
      - "5432:5432"
    volumes:
      - rtm-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtm -d rtm"]
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build: ./producer
    container_name: rtm-producer
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BROKER: kafka:9092
      METRICS_RAW_TOPIC: metrics_raw
      INCIDENT_COMMANDS_TOPIC: incident_commands
      HOST_ID: demo-host-1
      METRICS_SOURCE: simulator

  consumer:
    build: ./consumer
    container_name: rtm-consumer
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BROKER: kafka:9092
      METRICS_RAW_TOPIC: metrics_raw
      METRICS_ANOMALY_TOPIC: metrics_anomalies
      PG_HOST: postgres
      PG_DB: rtm
      PG_USER: rtm
      PG_PASSWORD: rtm

  stream-processor:
    build: ./stream-processor
    container_name: rtm-stream-processor
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registrar:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BROKER: kafka:9092
      METRICS_RAW_TOPIC: metrics_raw
      METRICS_ANOMALY_TOPIC: metrics_anomalies
      FLINK_GROUP_ID: rtm-flink-anomaly
      FLINK_PARALLELISM: 1
      FLINK_STARTING_OFFSET: latest

  demo-api:
    build: ./demo-api
    container_name: rtm-demo-api
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BROKER: kafka:9092
      INCIDENT_COMMANDS_TOPIC: incident_commands
      PG_HOST: postgres
      PG_DB: rtm
      PG_USER: rtm
      PG_PASSWORD: rtm

  grafana:
    image: grafana/grafana:10.4.1
    container_name: rtm-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      POSTGRES_DB: rtm
      POSTGRES_USER: rtm
      POSTGRES_PASSWORD: rtm
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning


  anomaly-detector:
    build: ./anomaly-detector
    container_name: rtm-anomaly-detector
    profiles:
      - legacy
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BROKER: kafka:9092
      METRICS_RAW_TOPIC: metrics_raw
      METRICS_ANOMALY_TOPIC: metrics_anomalies



volumes:
  rtm-postgres-data:
  grafana-data:
